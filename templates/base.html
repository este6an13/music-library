<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personal music collection — songs, collected.">
    <title>{% block title %}Music Library{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="site-logo">&#9835; library</a>
            <nav class="site-nav">
                {% block header_controls %}{% endblock %}
                <div class="nav-dropdown">
                    <button class="nav-link nav-dropdown-btn"
                        onclick="document.getElementById('export-menu').classList.toggle('active')">
                        <span class="material-symbols-outlined">download</span>
                        <span class="nav-link-text">export</span>
                    </button>
                    <div class="nav-dropdown-content" id="export-menu">
                        <a href="/api/export/csv" class="nav-dropdown-item" title="Export as CSV">CSV</a>
                        <a href="/api/export/json" class="nav-dropdown-item" title="Export as JSON">JSON</a>
                        <a href="/api/export/xlsx" class="nav-dropdown-item" title="Export as XLSX">XLSX</a>
                    </div>
                </div>
                <a href="/add" class="nav-link">
                    <span class="material-symbols-outlined">add_circle</span>
                    <span class="nav-link-text">add</span>
                </a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Track detail modal -->
    <div id="track-modal" class="modal" role="dialog" aria-modal="true" aria-label="Track detail">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-copyright">
                &copy; <span id="current-year"></span> Diego Esteban
            </div>
            <div class="footer-tagline">songs, collected.</div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        function closeModal() {
            const modal = document.getElementById('track-modal');
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');

            // Stop any playing audio
            const audio = document.getElementById('preview-audio');
            if (audio) { audio.pause(); audio.currentTime = 0; }
        }

        // Close on Escape or click outside
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeModal();
                const exportMenu = document.getElementById('export-menu');
                if (exportMenu) exportMenu.classList.remove('active');
            }
        });
        document.addEventListener('click', function (e) {
            const dropdown = document.querySelector('.nav-dropdown');
            const exportMenu = document.getElementById('export-menu');
            if (dropdown && !dropdown.contains(e.target) && exportMenu) {
                exportMenu.classList.remove('active');
            }
        });
    </script>
</body>

</html>
