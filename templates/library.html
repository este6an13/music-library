{% extends "base.html" %}

{% block title %}Music Library{% endblock %}

{% block header_controls %}
<div id="search-form" class="search-form">
    <div class="search-container">
        <button type="button" id="search-toggle" class="nav-btn-circle nav-icon-btn mobile-only"
            title="Search Tracks" onclick="toggleMobileSearch()">
            <span class="material-symbols-outlined">search</span>
        </button>
        <input type="search" class="search-input" placeholder="Search songs..."
            onkeydown="if(event.key==='Enter') event.preventDefault();"
            oninput="handleSearchInput(this.value)">
    </div>

    <!-- Group by controls -->
    <div class="group-controls">
        <button type="button" class="nav-btn-circle nav-icon-btn" id="group-artist-btn"
            title="Group by Artist" onclick="Library.groupBy('artist')">
            <span class="material-symbols-outlined">person</span>
        </button>
        <button type="button" class="nav-btn-circle nav-icon-btn" id="group-year-btn"
            title="Group by Year" onclick="Library.groupBy('year')">
            <span class="material-symbols-outlined">calendar_month</span>
        </button>
        <button type="button" class="nav-btn-circle nav-icon-btn" id="group-tag-btn"
            title="Group by Tag" onclick="Library.groupBy('tag')">
            <span class="material-symbols-outlined">label</span>
        </button>
        <button type="button" class="nav-btn-circle nav-icon-btn" id="group-album-btn"
            title="Group by Album" onclick="Library.groupBy('album')">
            <span class="material-symbols-outlined">album</span>
        </button>
        <div class="header-divider" style="width: 1px; height: 24px; background: rgba(255,255,255,0.2); margin: 0 0.25rem;"></div>
        <button type="button" class="nav-btn-circle nav-icon-btn" id="playlist-mode-btn"
            title="Create Playlist" onclick="Library.togglePlaylistMode()">
            <span class="material-symbols-outlined">queue_music</span>
        </button>
    </div>
</div>
<span class="nav-count" id="track-count"></span>
{% endblock %}

{% block content %}
<div class="library-wrapper">
    <div class="library-hero">
        <p class="library-tagline">songs, collected.</p>
        <div id="active-tag-indicator" class="active-tag-chip" style="display: none;">
            <span id="active-tag-text"></span>
            <button type="button" onclick="Library.clearTag()" class="clear-tag-btn"
                title="Clear Filter">&times;</button>
        </div>
        <div id="active-group-indicator" class="active-tag-chip group-chip" style="display: none;">
            <span class="material-symbols-outlined" style="font-size: 1rem; opacity: 0.7;" id="group-icon">person</span>
            <span id="active-group-text"></span>
            <button type="button" onclick="Library.groupBy('none')" class="clear-tag-btn"
                title="Clear Grouping">&times;</button>
        </div>
    </div>

    <div id="track-grid">
        <!-- Loading state — replaced by library.js -->
        <div class="loading-state">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>
</div>

<!-- Floating Playlist Panel -->
<div id="playlist-panel" class="playlist-panel" style="display: none;">
    <div class="playlist-panel-header">
        <h3 style="font-family: var(--font-serif); font-size: 1.2rem; margin: 0;">Create Playlist</h3>
        <button type="button" class="nav-icon-btn" onclick="Library.togglePlaylistMode()" title="Close" style="color: var(--text-muted); padding: 0.2rem;">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    <div class="playlist-panel-content">
        <input type="text" id="playlist-name-input" class="form-input" placeholder="Playlist Name (e.g. Summer Mix)" style="margin-bottom: 1rem; padding: 0.6rem; font-size: 0.9rem;">
        <div class="playlist-stats" style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: flex; justify-content: space-between;">
            <span id="playlist-count">0 tracks selected</span>
            <button type="button" onclick="Library.clearPlaylist()" style="background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.8rem; padding: 0;">Clear All</button>
        </div>
        <div id="playlist-items-container" class="playlist-items-container">
            <!-- Selected items appear here -->
            <div class="empty-state" style="padding: 1rem 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
                Click on songs in the library to add them to your playlist.
            </div>
        </div>
    </div>
    <div class="playlist-panel-footer">
        <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; text-align: center;">Export Format:</div>
        <div class="playlist-export-actions" style="display: flex; gap: 0.5rem;">
            <button type="button" class="btn btn-secondary" style="flex: 1; padding: 0.5rem;" onclick="Library.exportPlaylist('m3u')">.M3U</button>
            <button type="button" class="btn btn-secondary" style="flex: 1; padding: 0.5rem;" onclick="Library.exportPlaylist('csv')">.CSV</button>
            <button type="button" class="btn btn-secondary" style="flex: 1; padding: 0.5rem;" onclick="Library.exportPlaylist('txt')">.TXT</button>
        </div>
    </div>
</div>

<script>
    window.__TRACKS = {{ tracks_json | safe }};
</script>
<script src="/static/js/library.js?v=5"></script>
<script>
    (function () {
        function boot() {
            Library.init(window.__TRACKS);
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', boot);
        } else {
            boot();
        }
    })();

    /* Search debounce */
    let searchTimer = null;
    function handleSearchInput(value) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (typeof Library !== 'undefined') {
                Library.search(value);
            }
        }, 300);
    }

    /* Mobile search toggle */
    function toggleMobileSearch() {
        const form = document.getElementById('search-form');
        const input = form.querySelector('.search-input');
        const isShowing = form.classList.toggle('show-search');
        if (isShowing) input.focus();
    }
</script>
{% endblock %}
